<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightRadar Finland | Live Air Traffic</title>
    <meta name="description"
        content="Real-time flight radar tracking for Finland. Watch aircraft move across the Finnish airspace in live time.">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;&display=swap" rel="stylesheet">
</head>

<body>
    <div id="app">
        <header class="main-header">
            <div class="logo">
                <span class="pulse"></span>
                <h1>FINLAND<span>FLIGHTS</span></h1>
            </div>
            <div class="stats-bar">
                <div class="stat-item refresh-timer">
                    <span class="label">NEXT UPDATE</span>
                    <span id="countdown" class="value">30s</span>
                </div>
                <div class="stat-item">
                    <span class="label">ACTIVE FLIGHTS</span>
                    <span id="flight-count" class="value">0</span>
                </div>
                <div class="stat-item">
                    <span class="label">LAST UPDATE</span>
                    <span id="last-update" class="value">--:--:--</span>
                </div>
            </div>
        </header>

        <div id="map"></div>

        <aside id="info-panel" class="info-panel hidden">
            <button id="close-panel" class="close-btn">&times;</button>
            <div class="panel-content">
                <div class="flight-header">
                    <div id="flight-callsign" class="callsign">FIN123</div>
                    <div id="flight-origin-dest" class="route">Loading route...</div>
                </div>

                <div class="flight-details">
                    <div class="detail-row">
                        <div class="detail">
                            <span class="label">Altitude</span>
                            <span id="flight-alt" class="value">--</span>
                        </div>
                        <div class="detail">
                            <span class="label">Velocity</span>
                            <span id="flight-vel" class="value">--</span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail">
                            <span class="label">Heading</span>
                            <span id="flight-heading" class="value">--</span>
                        </div>
                        <div class="detail">
                            <span class="label">Origin</span>
                            <span id="flight-country" class="value">--</span>
                        </div>
                    </div>
                    <div class="detail-row">
                        <div class="detail">
                            <span class="label">ICAO24</span>
                            <span id="flight-icao" class="value">--</span>
                        </div>
                    </div>
                </div>

                <div class="visual-graph">
                    <!-- Subtle micro-animation container -->
                    <div class="radar-scan"></div>
                </div>
            </div>
        </aside>

        <div id="loading-overlay" class="loading-overlay">
            <div class="loader">
                <div class="spinner"></div>
                <p>Establishing Connection to OpenSky Radar...</p>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>

</html>
